services:
  mysql:
    image: mysql:8.4
    container_name: image-pro-mysql
    restart: always
    command:
      - --skip-log-bin
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nano_banana_pro}
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3310}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_PASSWORD:-change_me}"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build: .
    container_name: image-pro
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "127.0.0.1:${PORT:-3365}:${PORT:-3365}"
    volumes:
      - ./uploads:/app/uploads
      - ./storage/line4:/app/storage/generated/line4
    environment:
      PORT: ${PORT:-3365}
      NODE_ENV: ${NODE_ENV:-production}
      APP_NAME: ${APP_NAME:-Nano Banana Pro}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@example.com}
      DEFAULT_SIGNUP_POINTS: ${DEFAULT_SIGNUP_POINTS:-0}
      MYSQL_URL: ${MYSQL_URL:-}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nano_banana_pro}
      MYSQL_CONNECTION_LIMIT: ${MYSQL_CONNECTION_LIMIT:-10}
      IMAGE_ROUTE_DEFAULT_KEY: ${IMAGE_ROUTE_DEFAULT_KEY:-}
      IMAGE_ROUTE_NANO_BANANA_PRO_LINE1_KEY: ${IMAGE_ROUTE_NANO_BANANA_PRO_LINE1_KEY:-}
      IMAGE_ROUTE_NANO_BANANA_PRO_LINE2_KEY: ${IMAGE_ROUTE_NANO_BANANA_PRO_LINE2_KEY:-}
      IMAGE_ROUTE_NANO_BANANA_PRO_LINE3_KEY: ${IMAGE_ROUTE_NANO_BANANA_PRO_LINE3_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_BASE_URL: ${GEMINI_API_BASE_URL:-https://api.bltcy.ai}
      PROMPT_TOOL_MODEL: ${PROMPT_TOOL_MODEL:-gemini-3.1-pro-preview}
      PROMPT_OPTIMIZE_COST: ${PROMPT_OPTIMIZE_COST:-0.5}
      REVERSE_PROMPT_COST: ${REVERSE_PROMPT_COST:-1}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      BILLING_ADMIN_API_KEY: ${BILLING_ADMIN_API_KEY:-}
      ANNOUNCEMENT_ADMIN_API_KEY: ${ANNOUNCEMENT_ADMIN_API_KEY:-}
      GENERATED_ASSET_STORAGE: ${GENERATED_ASSET_STORAGE:-off}
      GENERATED_ASSET_PROVIDER: ${GENERATED_ASSET_PROVIDER:-aliyun-oss}
      GENERATED_ASSET_PUBLIC_BASE_URL: ${GENERATED_ASSET_PUBLIC_BASE_URL:-}
      GENERATED_ASSET_BUCKET: ${GENERATED_ASSET_BUCKET:-}
      GENERATED_ASSET_PREFIX: ${GENERATED_ASSET_PREFIX:-generated/images}
      GENERATED_ASSET_MAX_BYTES: ${GENERATED_ASSET_MAX_BYTES:-52428800}
      GENERATED_ASSET_DOWNLOAD_TIMEOUT_MS: ${GENERATED_ASSET_DOWNLOAD_TIMEOUT_MS:-30000}
      GENERATED_ASSET_CACHE_CONTROL: ${GENERATED_ASSET_CACHE_CONTROL:-public, max-age=31536000, immutable}
      ALIYUN_OSS_REGION: ${ALIYUN_OSS_REGION:-}
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT:-}
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID:-}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}

volumes:
  mysql-data:
